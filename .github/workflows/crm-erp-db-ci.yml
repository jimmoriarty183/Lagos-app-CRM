name: crm-erp-db-ci

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_uat:
        description: Run UAT SQL package
        required: false
        default: "false"

jobs:
  app_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Conflict markers
        run: npm run check:conflicts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  db_migrate_and_smoke:
    runs-on: ubuntu-latest
    needs: app_checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${file}"
            psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f "${file}"
          done

      - name: Load seed scenarios
        run: psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f supabase/sql/seed_crm_erp_test_scenarios.sql

      - name: Run smoke check
        run: psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f supabase/sql/smoke_check_crm_erp_post_migration.sql

  db_uat_flows:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_uat == 'true'
    runs-on: ubuntu-latest
    needs: db_migrate_and_smoke
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${file}"
            psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f "${file}"
          done

      - name: Load seed scenarios
        run: psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f supabase/sql/seed_crm_erp_test_scenarios.sql

      - name: Run smoke check
        run: psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f supabase/sql/smoke_check_crm_erp_post_migration.sql

      - name: Run UAT package
        run: psql -h localhost -U postgres -d app -v ON_ERROR_STOP=1 -f supabase/sql/uat_crm_erp_business_flows.sql
